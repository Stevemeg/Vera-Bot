app = "vera-bot"
primary_region = "sin"

[build]

[env]
  VERA_PERSIST_PATH = "/srv/data/context_snapshot.json"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "vera_data"
  destination = "/srv/data"

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/v1/healthz"
